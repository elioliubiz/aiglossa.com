<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的官网</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            color: #0f172a;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        p { font-size: 1.2rem; color: #475569; }
        .badge {
            margin-top: 1.5rem;
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background: #e2e8f0;
            border-radius: 999px;
            font-size: 0.9rem;
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 我的官网</h1>
        <p>已经成功部署到 Vercel 了！</p>
        <span class="badge">✅ 部署成功</span>
    </div>
</body>
</html>
